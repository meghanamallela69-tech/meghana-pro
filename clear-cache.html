<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🔄 Clear Cache & Reload</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            max-width: 600px;
            margin: 50px auto;
            padding: 20px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }
        .container {
            background: rgba(255, 255, 255, 0.95);
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
        }
        h1 { color: #667eea; }
        button {
            background: #667eea;
            color: white;
            border: none;
            padding: 15px 30px;
            font-size: 16px;
            border-radius: 5px;
            cursor: pointer;
            margin: 10px 5px;
        }
        button:hover { background: #5568d3; }
        .secondary { background: #6c757d; }
        .secondary:hover { background: #5a6268; }
        .status {
            margin-top: 20px;
            padding: 15px;
            border-radius: 5px;
            display: none;
        }
        .success { background: #d4edda; color: #155724; }
        .info { background: #d1ecf1; color: #0c5460; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🔄 Clear Browser Cache</h1>
        <p>This will clear all cached files and reload the application with fresh code.</p>
        
        <button onclick="clearCacheAndReload()">Clear Cache & Reload</button>
        <button class="secondary" onclick="hardReload()">Hard Reload (Ctrl+Shift+R)</button>
        
        <div id="status" class="status"></div>
        
        <hr style="margin: 30px 0; border: none; border-top: 1px solid #ddd;">
        
        <h3>Manual Steps:</h3>
        <ol>
            <li>Press <strong>F12</strong> to open DevTools</li>
            <li>Right-click the <strong>Refresh</strong> button</li>
            <li>Select <strong>"Empty Cache and Hard Reload"</strong></li>
        </ol>
        
        <p><strong>Or press:</strong> Ctrl + Shift + R (Windows) or Cmd + Shift + R (Mac)</p>
    </div>

    <script>
        function clearCacheAndReload() {
            const status = document.getElementById('status');
            
            // Clear all caches
            if ('caches' in window) {
                caches.keys().then(names => {
                    names.forEach(name => caches.delete(name));
                });
            }
            
            // Force reload without cache
            status.style.display = 'block';
            status.className = 'info';
            status.innerHTML = '⏳ Clearing cache and reloading...';
            
            setTimeout(() => {
                window.location.reload(true);
            }, 1000);
        }
        
        function hardReload() {
            window.location.reload(true);
        }
    </script>
</body>
</html>
